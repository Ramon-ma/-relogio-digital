<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relógio Digital Moderno</title>
    <style>
        /* Estilização (CSS) */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
        }

        .relogio {
            background: #333;
            padding: 30px 50px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-size: 80px;
            letter-spacing: 5px;
            border: 2px solid #444;
        }
    </style>
</head>
<body>

    <!-- Estrutura (HTML) -->
    <div class="relogio" id="display">00:00:00</div>

    <script>
        // Lógica do Relógio (JavaScript)
        function atualizarRelogio() {
            const agora = new Date();
            
            // Extrai horas, minutos e segundos
            let h = agora.getHours();
            let m = agora.getMinutes();
            let s = agora.getSeconds();

            // Adiciona um zero à esquerda se for menor que 10
            h = h < 10 ? '0' + h : h;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;

            // Atualiza o texto na tela
            document.getElementById('display').textContent = `${h}:${m}:${s}`;
        }

        // Executa a função a cada 1 segundo (1000ms)
        setInterval(atualizarRelogio, 1000);

        // Chama a função imediatamente para não esperar 1 segundo ao carregar
        atualizarRelogio();
    </script>

</body>
</html>
